<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>כניסה / הרשמה – ניקוד★</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0A0E1A;--surface:#111827;--card:#1C2333;--border:#2A3450;
  --accent:#6C63FF;--accent2:#FF6B6B;--gold:#FFD166;--green:#06D6A0;
  --text:#E8EBF4;--muted:#8892AA;--r:16px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);color:var(--text);font-family:'Heebo',sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  background:radial-gradient(ellipse 70% 50% at 50% 0%, rgba(108,99,255,0.18) 0%, transparent 70%);
}
.auth-box{
  background:var(--card);border:1px solid var(--border);border-radius:24px;
  padding:40px;width:100%;max-width:420px;
}
.logo{text-align:center;font-size:1.8rem;font-weight:900;color:var(--accent);margin-bottom:8px}
.logo span{color:var(--gold)}
.auth-sub{text-align:center;color:var(--muted);font-size:0.9rem;margin-bottom:32px}

.role-tabs{display:flex;gap:8px;margin-bottom:24px;background:var(--surface);border-radius:12px;padding:4px}
.role-tab{
  flex:1;padding:10px;border:none;background:none;color:var(--muted);
  border-radius:9px;cursor:pointer;font-family:'Heebo',sans-serif;font-size:0.88rem;font-weight:600;
  transition:all 0.2s;
}
.role-tab.active{background:var(--accent);color:#fff}

.mode-toggle{display:flex;justify-content:center;gap:20px;margin-bottom:24px}
.mode-btn{background:none;border:none;color:var(--muted);font-family:'Heebo',sans-serif;font-size:0.95rem;cursor:pointer;padding-bottom:6px;border-bottom:2px solid transparent}
.mode-btn.active{color:var(--text);border-color:var(--accent);font-weight:700}

.field{margin-bottom:16px}
.field label{display:block;font-size:0.85rem;color:var(--muted);margin-bottom:6px}
.field input,.field select{
  width:100%;background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:12px 14px;color:var(--text);
  font-family:'Heebo',sans-serif;font-size:0.95rem;outline:none;transition:border-color 0.2s;
}
.field input:focus,.field select:focus{border-color:var(--accent)}

.submit-btn{
  width:100%;padding:14px;background:var(--accent);border:none;border-radius:12px;
  color:#fff;font-family:'Heebo',sans-serif;font-size:1rem;font-weight:700;
  cursor:pointer;margin-top:8px;transition:all 0.2s;
}
.submit-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(108,99,255,0.4)}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed}

.error-msg{
  background:rgba(255,107,107,0.12);border:1px solid rgba(255,107,107,0.3);
  color:var(--accent2);padding:10px 14px;border-radius:10px;font-size:0.85rem;
  margin-bottom:16px;display:none;
}
.error-msg.show{display:block}
.success-msg{
  background:rgba(6,214,160,0.12);border:1px solid rgba(6,214,160,0.3);
  color:var(--green);padding:10px 14px;border-radius:10px;font-size:0.85rem;
  margin-bottom:16px;display:none;
}
.success-msg.show{display:block}

.back-link{display:block;text-align:center;margin-top:20px;color:var(--muted);text-decoration:none;font-size:0.85rem}
.back-link:hover{color:var(--text)}

.hidden{display:none}
.setup-note{
  background:rgba(255,209,102,0.08);border:1px solid rgba(255,209,102,0.25);
  border-radius:10px;padding:12px 14px;font-size:0.78rem;color:var(--gold);
  margin-bottom:20px;line-height:1.5;
}
</style>
</head>
<body>

<div class="auth-box">
  <div class="logo">ניקוד<span>★</span></div>
  <div class="auth-sub">כניסה למערכת התגמול</div>

  <div class="setup-note" id="setupNote">
    ⚠️ <strong>למפתח:</strong> חבר את Supabase ב-config.js לפני שטופס זה יעבוד באמת.
  </div>

  <div class="role-tabs">
    <button class="role-tab active" onclick="setRole('student', this)">תלמיד</button>
    <button class="role-tab" onclick="setRole('teacher', this)">מורה</button>
    <button class="role-tab" onclick="setRole('principal', this)">מנהל בית ספר</button>
  </div>

  <div class="mode-toggle">
    <button class="mode-btn active" onclick="setMode('login', this)">כניסה</button>
    <button class="mode-btn" onclick="setMode('register', this)">הרשמה</button>
  </div>

  <div class="error-msg" id="errorMsg"></div>
  <div class="success-msg" id="successMsg"></div>

  <form id="authForm" onsubmit="handleSubmit(event)">
    <!-- Register-only fields -->
    <div id="registerFields" class="hidden">
      <div class="field">
        <label>שם מלא</label>
        <input type="text" id="nameInput" placeholder="ישראל ישראלי">
      </div>
      <div class="field" id="schoolCodeField">
        <label>קוד בית ספר</label>
        <input type="text" id="schoolCodeInput" placeholder="שתקבל מבית הספר">
      </div>
      <div class="field hidden" id="classField">
        <label>כיתה</label>
        <input type="text" id="classInput" placeholder='למשל: י"א 3'>
      </div>
      <div class="field hidden" id="schoolNameField">
        <label>שם בית הספר</label>
        <input type="text" id="schoolNameInput" placeholder="תיכון שומר האופק">
      </div>
    </div>

    <div class="field">
      <label>אימייל</label>
      <input type="email" id="emailInput" placeholder="name@example.com" required>
    </div>
    <div class="field">
      <label>סיסמה</label>
      <input type="password" id="passwordInput" placeholder="••••••••" required minlength="6">
    </div>

    <button type="submit" class="submit-btn" id="submitBtn">כניסה</button>
  </form>

  <a href="index.html" class="back-link">← חזרה לדף הבית</a>
</div>

<script>
// חיבור ל-Supabase - פרטי הפרויקט
const SUPABASE_URL = 'https://iyibnkdstmijttvprpxk.supabase.co'
const SUPABASE_KEY = 'sb_publishable_AYB1c9H3wEUxdG0Z6OsCZA_dE9UMq9d'

let supabase = null

function markConnected() {
  const note = document.getElementById('setupNote')
  note.classList.add('hidden')
}

function markError(msg) {
  const note = document.getElementById('setupNote')
  note.innerHTML = '❌ <strong>שגיאת חיבור:</strong> ' + msg
  note.classList.remove('hidden')
}

try {
  if (typeof window.supabase === 'undefined') {
    markError('ספריית Supabase לא נטענה (בעיית CDN/רשת). רענן את הדף.')
  } else {
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
    markConnected()
  }
} catch(e) {
  markError(e.message || 'שגיאה לא ידועה בעת יצירת חיבור')
}

let currentRole = 'student'
let currentMode = 'login'

function setRole(role, btn) {
  currentRole = role
  document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'))
  btn.classList.add('active')
  updateFormFields()
}

function setMode(mode, btn) {
  currentMode = mode
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  document.getElementById('registerFields').classList.toggle('hidden', mode === 'login')
  document.getElementById('submitBtn').textContent = mode === 'login' ? 'כניסה' : 'הרשמה'
  updateFormFields()
}

function updateFormFields() {
  const classField = document.getElementById('classField')
  const schoolNameField = document.getElementById('schoolNameField')
  const schoolCodeField = document.getElementById('schoolCodeField')

  if (currentMode === 'register') {
    if (currentRole === 'student') {
      classField.classList.remove('hidden')
      schoolNameField.classList.add('hidden')
      schoolCodeField.classList.remove('hidden')
    } else if (currentRole === 'teacher') {
      classField.classList.add('hidden')
      schoolNameField.classList.add('hidden')
      schoolCodeField.classList.remove('hidden')
    } else if (currentRole === 'principal') {
      classField.classList.add('hidden')
      schoolNameField.classList.remove('hidden')
      schoolCodeField.classList.add('hidden')
    }
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg')
  el.textContent = msg
  el.classList.add('show')
  document.getElementById('successMsg').classList.remove('show')
}
function showSuccess(msg) {
  const el = document.getElementById('successMsg')
  el.textContent = msg
  el.classList.add('show')
  document.getElementById('errorMsg').classList.remove('show')
}

async function handleSubmit(e) {
  e.preventDefault()
  const email = document.getElementById('emailInput').value
  const password = document.getElementById('passwordInput').value
  const btn = document.getElementById('submitBtn')

  if (!supabase) {
    showError('המערכת עדיין לא מחוברת ל-Supabase. ראה ההודעה למעלה לפרטי השגיאה.')
    return
  }

  btn.disabled = true
  btn.textContent = 'רגע...'

  try {
    if (currentMode === 'login') {
      const { data, error } = await supabase.auth.signInWithPassword({ email, password })
      if (error) throw error

      // Fetch user profile to determine redirect
      const { data: profile } = await supabase.from('users').select('role').eq('id', data.user.id).single()
      showSuccess('התחברת בהצלחה! מעביר אותך...')
      setTimeout(() => {
        if (profile.role === 'student') window.location.href = 'student-dashboard.html'
        else if (profile.role === 'teacher') window.location.href = 'teacher-dashboard.html'
        else window.location.href = 'school-dashboard.html'
      }, 800)

    } else {
      // REGISTER
      const name = document.getElementById('nameInput').value
      if (!name) { showError('נא למלא שם מלא'); btn.disabled = false; btn.textContent = 'הרשמה'; return }

      let school_id = null
      const schoolCode = document.getElementById('schoolCodeInput').value

      if (currentRole === 'principal') {
        // Create new school
        const schoolName = document.getElementById('schoolNameInput').value
        const { data: school, error: schoolErr } = await supabase
          .from('schools')
          .insert({ name: schoolName, plan: 'trial' })
          .select().single()
        if (schoolErr) throw schoolErr
        school_id = school.id
      } else {
        // Find school by code (assumes school code = school id prefix, simplified)
        const { data: school, error: findErr } = await supabase
          .from('schools').select('id').eq('id', schoolCode).single()
        if (findErr || !school) throw new Error('קוד בית ספר לא נמצא')
        school_id = school.id
      }

      const { data: authData, error: authErr } = await supabase.auth.signUp({ email, password })
      if (authErr) throw authErr

      const class_name = currentRole === 'student' ? document.getElementById('classInput').value : null

      const { error: profileErr } = await supabase.from('users').insert({
        id: authData.user.id,
        name, email, role: currentRole, school_id, class_name, points: 0
      })
      if (profileErr) throw profileErr

      showSuccess('נרשמת בהצלחה! בדוק את האימייל שלך לאימות, ואז התחבר.')
      setMode('login', document.querySelector('.mode-btn'))
    }
  } catch (err) {
    showError(err.message || 'משהו השתבש, נסה שוב')
  } finally {
    btn.disabled = false
    btn.textContent = currentMode === 'login' ? 'כניסה' : 'הרשמה'
  }
}
</script>
</body>
</html>
