<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>איפוס סיסמה – ניקוד★</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0B0620;--surface:rgba(255,255,255,0.04);--card:rgba(255,255,255,0.07);--border:rgba(255,255,255,0.16);
  --accent:#2E6FFF;--accent2:#FF3DBB;--gold:#FFC93D;--green:#06D6A0;
  --text:#F3EFFF;--muted:#C8BEEA;--r:16px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  color:var(--text);font-family:'Heebo',sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  background:
    radial-gradient(ellipse 60% 45% at 10% 0%, #FF3DBB33 0%, transparent 55%),
    radial-gradient(ellipse 55% 45% at 100% 10%, #2E6FFF33 0%, transparent 55%),
    radial-gradient(ellipse 55% 45% at 50% 100%, #7C4DFF2e 0%, transparent 55%),
    var(--bg);
}
.auth-box{
  background:var(--card);border:1px solid var(--border);border-radius:24px;
  padding:40px;width:100%;max-width:420px;backdrop-filter:blur(10px);
}
.logo{text-align:center;font-size:1.8rem;font-weight:900;color:var(--accent);margin-bottom:8px}
.logo span{color:var(--gold)}
.subtitle{text-align:center;color:var(--muted);font-size:0.9rem;margin-bottom:28px;line-height:1.6}
.field{margin-bottom:16px}
.field label{display:block;font-size:0.85rem;color:var(--muted);margin-bottom:7px}
.field input{
  width:100%;padding:13px 15px;border-radius:12px;
  border:1px solid var(--border);background:rgba(255,255,255,0.04);color:var(--text);
  font-family:'Heebo',sans-serif;font-size:0.95rem;transition:border-color 0.2s;
}
.field input:focus{outline:none;border-color:var(--accent)}
.submit-btn{
  width:100%;padding:14px;background:var(--accent);border:none;border-radius:12px;
  color:#fff;font-family:'Heebo',sans-serif;font-size:1rem;font-weight:700;
  cursor:pointer;margin-top:8px;transition:all 0.2s;
}
.submit-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(46,111,255,0.4)}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed}
.msg{padding:12px 15px;border-radius:12px;font-size:0.85rem;margin-bottom:16px;display:none;line-height:1.6}
.msg.show{display:block}
.error-msg{background:rgba(255,138,61,0.12);border:1px solid rgba(255,138,61,0.35);color:#FF8A3D}
.success-msg{background:rgba(6,214,160,0.12);border:1px solid rgba(6,214,160,0.35);color:var(--green)}
.back-link{display:block;text-align:center;margin-top:20px;color:var(--muted);text-decoration:none;font-size:0.85rem}
.back-link:hover{color:var(--text)}
.loading{text-align:center;color:var(--muted);padding:20px}
</style>
</head>
<body>
<div class="auth-box">
  <div class="logo">ניקוד<span>★</span></div>
  <div class="subtitle">בחירת סיסמה חדשה</div>

  <div class="msg error-msg" id="errorMsg"></div>
  <div class="msg success-msg" id="successMsg"></div>

  <div id="loadingState" class="loading">בודק את קישור האיפוס...</div>

  <div id="resetForm" style="display:none">
    <div class="field">
      <label>סיסמה חדשה</label>
      <input type="password" id="newPassword" placeholder="לפחות 6 תווים" minlength="6">
    </div>
    <div class="field">
      <label>אימות סיסמה</label>
      <input type="password" id="confirmPassword" placeholder="הקלד/י שוב" minlength="6">
    </div>
    <button class="submit-btn" id="resetBtn" onclick="updatePassword()">עדכן סיסמה</button>
  </div>

  <a href="login.html" class="back-link">← חזרה לכניסה</a>
</div>

<script>
const SUPABASE_URL = 'https://iyibnkdstmijttvprpxk.supabase.co'
const SUPABASE_KEY = 'sb_publishable_AYB1c9H3wEUxdG0Z6OsCZA_dE9UMq9d'
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

function showError(msg) {
  const el = document.getElementById('errorMsg')
  el.textContent = msg; el.classList.add('show')
  document.getElementById('successMsg').classList.remove('show')
}
function showSuccess(msg) {
  const el = document.getElementById('successMsg')
  el.textContent = msg; el.classList.add('show')
  document.getElementById('errorMsg').classList.remove('show')
}

// When the user arrives from the reset email, Supabase sets a recovery session.
async function init() {
  // Give Supabase a moment to process the recovery token from the URL hash
  await new Promise(r => setTimeout(r, 800))
  const { data: { session } } = await supabaseClient.auth.getSession()
  document.getElementById('loadingState').style.display = 'none'
  if (session) {
    document.getElementById('resetForm').style.display = 'block'
  } else {
    showError('קישור האיפוס אינו תקף או שפג תוקפו. בקש/י קישור חדש מדף הכניסה.')
  }
}

async function updatePassword() {
  const pw = document.getElementById('newPassword').value
  const confirm = document.getElementById('confirmPassword').value
  const btn = document.getElementById('resetBtn')

  if (pw.length < 6) { showError('הסיסמה חייבת להכיל לפחות 6 תווים'); return }
  if (pw !== confirm) { showError('הסיסמאות אינן תואמות'); return }

  btn.disabled = true
  btn.textContent = 'מעדכן...'
  try {
    const { error } = await supabaseClient.auth.updateUser({ password: pw })
    if (error) throw error
    document.getElementById('resetForm').style.display = 'none'
    showSuccess('הסיסמה עודכנה בהצלחה! מעביר אותך לכניסה...')
    setTimeout(() => { window.location.href = 'login.html' }, 2200)
  } catch (err) {
    showError(err.message || 'שגיאה בעדכון הסיסמה, נסה שוב')
    btn.disabled = false
    btn.textContent = 'עדכן סיסמה'
  }
}

init()
</script>
</body>
</html>
