<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מסך מורה – ניקוד★</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0B0620;--surface:rgba(255,255,255,0.04);--card:rgba(255,255,255,0.06);--border:rgba(255,255,255,0.14);
  --accent:#3DE0FF;--gold:#FFC93D;--green:#06D6A0;--red:#FF3DBB;
  --text:#F3EFFF;--muted:#C8BEEA;--r:16px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  color:var(--text);font-family:'Heebo',sans-serif;min-height:100vh;
  background:
    radial-gradient(ellipse 60% 45% at 10% 0%, #FF3DBB2e 0%, transparent 55%),
    radial-gradient(ellipse 55% 45% at 100% 10%, #3DE0FF2e 0%, transparent 55%),
    radial-gradient(ellipse 55% 45% at 50% 100%, #7C4DFF26 0%, transparent 55%),
    var(--bg);
  background-attachment:fixed;
}
.setup-card,.lesson-header,.student-card{backdrop-filter:blur(8px)}

nav{display:flex;justify-content:space-between;align-items:center;padding:16px 28px;border-bottom:1px solid var(--border);background:rgba(10,14,26,0.95);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
.logo{font-size:1.4rem;font-weight:900;color:var(--accent)}
.logo span{color:var(--gold)}
.nav-right{display:flex;align-items:center;gap:14px}
.logout-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:7px 16px;border-radius:99px;cursor:pointer;font-family:'Heebo',sans-serif;font-size:0.85rem}

.main{max-width:700px;margin:0 auto;padding:24px 20px 100px}

.setup-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:24px;margin-bottom:20px}
.setup-card h3{font-size:1rem;margin-bottom:14px}
.setup-row{display:flex;gap:10px;margin-bottom:10px}
.setup-row select,.setup-row input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:'Heebo',sans-serif;font-size:0.9rem}
.start-btn{width:100%;padding:13px;background:var(--accent);border:none;border-radius:12px;color:#fff;font-family:'Heebo',sans-serif;font-weight:700;cursor:pointer;font-size:0.95rem}

.lesson-header{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px 24px;margin-bottom:20px}
.lesson-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.lesson-title{font-size:1.2rem;font-weight:900}
.lesson-meta{font-size:0.82rem;color:var(--muted);margin-top:4px}
.lesson-stats{display:flex;gap:18px}
.l-stat{text-align:center}
.l-stat-num{font-size:1.4rem;font-weight:900}
.l-stat-lbl{font-size:0.72rem;color:var(--muted)}

.budget-box{margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.budget-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:0.82rem}
.budget-label{color:var(--muted)}
.budget-value{font-weight:700}
.budget-track{height:8px;border-radius:99px;background:var(--surface);overflow:hidden}
.budget-fill{height:100%;background:var(--green);border-radius:99px;transition:width 0.3s}
.budget-fill.warn{background:var(--gold)}
.budget-fill.over{background:var(--red)}
.budget-note{font-size:0.74rem;color:var(--muted);margin-top:6px}

.controls{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.ctrl-btn{flex:1;min-width:110px;padding:11px 14px;border:none;border-radius:12px;cursor:pointer;font-family:'Heebo',sans-serif;font-size:0.85rem;font-weight:700}
.ctrl-green{background:var(--green);color:#0A0E1A}
.ctrl-red{background:rgba(255,61,187,0.15);color:var(--red);border:1px solid rgba(255,61,187,0.3)}
.ctrl-purple{background:var(--accent);color:#fff}

.student-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px 16px;margin-bottom:9px;display:flex;align-items:center;gap:12px}
.student-card.approved{border-color:rgba(6,214,160,0.5);background:rgba(6,214,160,0.04)}
.student-card.bonus{border-color:rgba(255,201,61,0.5);background:rgba(255,201,61,0.04)}
.student-card.rejected{border-color:rgba(255,61,187,0.4);background:rgba(255,61,187,0.04);opacity:0.7}
.stu-avatar{width:38px;height:38px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700}
.stu-name{font-weight:700;font-size:0.9rem}
.stu-info{flex:1}
.stu-actions{display:flex;gap:5px}
.act-btn{width:34px;height:34px;border-radius:9px;border:none;cursor:pointer;font-size:0.95rem;display:flex;align-items:center;justify-content:center}
.btn-approve{background:rgba(6,214,160,0.15);color:var(--green)}
.btn-approve.selected{background:var(--green);color:#0A0E1A}
.btn-bonus{background:rgba(255,201,61,0.15);color:var(--gold)}
.btn-bonus.selected{background:var(--gold);color:#0A0E1A}
.btn-reject{background:rgba(255,61,187,0.15);color:var(--red)}
.btn-reject.selected{background:var(--red);color:#fff}

.stu-personal-bonus{display:flex;align-items:center;gap:6px;margin-top:4px}
.pb-btn{padding:3px 10px;border-radius:99px;border:1px solid rgba(255,201,61,0.4);background:rgba(255,201,61,0.1);color:var(--gold);font-size:0.7rem;font-weight:700;cursor:pointer;font-family:'Heebo',sans-serif}
.pb-btn:disabled{opacity:0.35;cursor:not-allowed}
.pb-count{font-size:0.68rem;color:var(--muted)}

.summary-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.sum-item{text-align:center}
.sum-num{font-size:1.2rem;font-weight:900}
.sum-lbl{font-size:0.7rem;color:var(--muted)}
.submit-btn{margin-right:auto;padding:12px 24px;background:var(--accent);border:none;border-radius:12px;color:#fff;font-family:'Heebo',sans-serif;font-weight:700;cursor:pointer}
.submit-btn:disabled{opacity:0.4;cursor:not-allowed}

.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(40px);background:var(--green);color:#0A0E1A;padding:12px 22px;border-radius:99px;font-weight:700;font-size:0.88rem;z-index:300;opacity:0;transition:all 0.3s}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.hidden{display:none}
.loading{text-align:center;padding:80px 20px;color:var(--muted)}
</style>
</head>
<body>

<nav>
  <div class="logo">ניקוד<span>★</span></div>
  <div class="nav-right">
    <span id="userName" style="font-size:0.88rem;color:var(--muted)"></span>
    <button class="logout-btn" onclick="logout()">יציאה</button>
  </div>
</nav>

<div id="loadingScreen" class="loading">טוען...</div>

<div class="main hidden" id="mainContent">

  <!-- Setup new lesson -->
  <div class="setup-card" id="setupCard">
    <h3>🆕 פתח שיעור חדש</h3>
    <div class="setup-row">
      <input type="text" id="subjectInput" placeholder="מקצוע (למשל: מתמטיקה)">
      <input type="text" id="classInput" placeholder='כיתה (למשל: י"א 3)'>
    </div>
    <button class="start-btn" onclick="startLesson()">▶ התחל שיעור</button>
  </div>

  <!-- Active lesson -->
  <div id="activeLessonSection" class="hidden">
    <div class="lesson-header">
      <div class="lesson-top">
        <div>
          <div class="lesson-title" id="lessonTitle"></div>
          <div class="lesson-meta" id="lessonMeta"></div>
        </div>
      </div>
      <div class="lesson-stats">
        <div class="l-stat"><div class="l-stat-num" style="color:var(--green)" id="statApproved">0</div><div class="l-stat-lbl">אושרו</div></div>
        <div class="l-stat"><div class="l-stat-num" style="color:var(--red)" id="statRejected">0</div><div class="l-stat-lbl">לא אושרו</div></div>
        <div class="l-stat"><div class="l-stat-num" style="color:var(--muted)" id="statPending">0</div><div class="l-stat-lbl">ממתינים</div></div>
      </div>

      <div class="budget-box">
        <div class="budget-top">
          <span class="budget-label">תקציב נקודות לכיתה החודש</span>
          <span class="budget-value" id="budgetValueText">—</span>
        </div>
        <div class="budget-track"><div class="budget-fill" id="budgetFill" style="width:0%"></div></div>
        <div class="budget-note" id="budgetNote"></div>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl-btn ctrl-green" onclick="approveAll()">✅ אשר הכל</button>
      <button class="ctrl-btn ctrl-red" onclick="clearAll()">🔄 אפס</button>
      <button class="ctrl-btn ctrl-purple" onclick="openSubmit()">📤 שלח ואשר</button>
    </div>
    <div class="controls">
      <button class="ctrl-btn" style="background:var(--surface);border:1px solid var(--border);color:var(--text)" onclick="refreshCheckins()">🔄 רענן צ'ק-אינים</button>
    </div>

    <div id="studentList"></div>
  </div>
</div>

<div class="summary-bar hidden" id="summaryBar">
  <div class="sum-item"><div class="sum-num" style="color:var(--green)" id="sumApproved">0</div><div class="sum-lbl">אושרו</div></div>
  <div class="sum-item"><div class="sum-num" style="color:var(--accent)" id="sumPts">0</div><div class="sum-lbl">נקודות לחלק</div></div>
  <button class="submit-btn" onclick="openSubmit()">📤 שלח ואשר</button>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://iyibnkdstmijttvprpxk.supabase.co'
const SUPABASE_KEY = 'sb_publishable_AYB1c9H3wEUxdG0Z6OsCZA_dE9UMq9d'
let supabaseClient = null
let currentUser = null
let currentSchoolPlan = 'trial'
let currentLesson = null
let students = []
const state = {} // student_id -> 'approved' | 'bonus' | 'rejected' | null

// ---- Points awarded ----
const ATTENDANCE_POINTS = 3   // was 20 (base value, before surge)
const BONUS_POINTS = 5        // was 35 (base value, before surge)
let currentAttendancePoints = ATTENDANCE_POINTS   // dynamic - may be boosted by surge for this specific lesson
let currentBonusPoints = BONUS_POINTS
let isSurgeActive = false
let surgeDemandScore = null

// ---- Surge Points: automatically boosts points for time-slots with chronically low attendance ----
const SURGE_LOW_THRESHOLD = 0.6     // if historical attendance rate for this subject+day-of-week < 60%, activate surge
const SURGE_MULTIPLIER = 1.5        // points multiplier when surge is active
const SURGE_LOOKBACK_DAYS = 90      // how far back to look for historical pattern

// ---- Personal bonus (teacher can give any student, any time, independent of approval flow) ----
const PERSONAL_BONUS_POINTS = 5
const PERSONAL_BONUS_MONTHLY_CAP = 50   // per student, per calendar month
let personalBonusUsed = {}              // student_id -> points already given this month via personal bonus

// ---- Per-student monthly point cap (all reasons combined) ----
const STUDENT_MONTHLY_CAP = 300   // max points any single student can receive per calendar month, across ALL reasons
let studentMonthlyTotal = {}      // student_id -> total points already received this month (any reason)

// ---- Class monthly point budget ----
// School allocates 300 ₪ per class per month. Conversion rate: 30 points = 1 ₪.
const POINTS_PER_ILS = 30
const CLASS_MONTHLY_BUDGET_ILS = 300
const CLASS_MONTHLY_BUDGET_POINTS = CLASS_MONTHLY_BUDGET_ILS * POINTS_PER_ILS // 9000
let issuedThisMonth = 0   // points already given to this class this calendar month (before this lesson)
let remainingBudget = CLASS_MONTHLY_BUDGET_POINTS

// ---- Student self check-ins for the active lesson ----
let checkins = {}          // student_id -> checkin row {id, status, points}
let checkinPollTimer = null

function firstOfMonthISO() {
  const d = new Date()
  return new Date(d.getFullYear(), d.getMonth(), 1).toISOString()
}

async function init() {
  try {
    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
  } catch(e) {
    document.getElementById('loadingScreen').innerHTML =
      '⚠️ המערכת לא מחוברת ל-Supabase עדיין. חבר את הפרטים כדי להפעיל נתונים אמיתיים.'
    return
  }

  const { data: { user } } = await supabaseClient.auth.getUser()
  if (!user) { window.location.href = 'login.html'; return }

  const { data: profile } = await supabaseClient.from('users').select('*').eq('id', user.id).single()
  if (!profile || profile.role !== 'teacher') { window.location.href = 'login.html'; return }

  currentUser = profile
  document.getElementById('userName').textContent = profile.name

  const { data: school } = await supabaseClient.from('schools').select('plan').eq('id', profile.school_id).single()
  currentSchoolPlan = school ? school.plan : 'trial'

  document.getElementById('loadingScreen').style.display = 'none'
  document.getElementById('mainContent').classList.remove('hidden')
}

async function getClassBudgetRemaining(class_name) {
  const { data: monthLogs, error } = await supabaseClient
    .from('point_logs')
    .select('points, lessons!inner(class_name, school_id, created_at)')
    .eq('lessons.class_name', class_name)
    .eq('lessons.school_id', currentUser.school_id)
    .gte('lessons.created_at', firstOfMonthISO())

  if (error) { console.error(error); return CLASS_MONTHLY_BUDGET_POINTS }

  const used = (monthLogs || []).reduce((sum, log) => sum + log.points, 0)
  return CLASS_MONTHLY_BUDGET_POINTS - used
}

function renderBudgetBar(afterThisAward = 0) {
  const projected = remainingBudget - afterThisAward
  const usedPoints = CLASS_MONTHLY_BUDGET_POINTS - projected
  const pctUsed = Math.min(100, Math.max(0, (usedPoints / CLASS_MONTHLY_BUDGET_POINTS) * 100))

  const fill = document.getElementById('budgetFill')
  fill.style.width = pctUsed + '%'
  fill.className = 'budget-fill' + (projected < 0 ? ' over' : pctUsed >= 80 ? ' warn' : '')

  document.getElementById('budgetValueText').textContent =
    `${Math.max(0, projected).toLocaleString()} נקודות נותרו (₪${Math.max(0,(projected/POINTS_PER_ILS)).toFixed(0)})`

  const note = document.getElementById('budgetNote')
  if (projected < 0) {
    note.textContent = `⚠️ חריגה של ${Math.abs(projected)} נקודות מהתקציב החודשי של הכיתה!`
    note.style.color = 'var(--red)'
  } else if (pctUsed >= 80) {
    note.textContent = `⚠️ מתקרבים לתקרת התקציב החודשי (${CLASS_MONTHLY_BUDGET_ILS} ₪ לכיתה)`
    note.style.color = 'var(--gold)'
  } else {
    note.textContent = `מתוך ${CLASS_MONTHLY_BUDGET_POINTS.toLocaleString()} נקודות (${CLASS_MONTHLY_BUDGET_ILS} ₪) לחודש`
    note.style.color = 'var(--muted)'
  }
}

async function refreshCheckins() {
  if (!currentLesson) return
  const { data, error } = await supabaseClient
    .from('checkins')
    .select('*')
    .eq('lesson_id', currentLesson.id)

  if (error) { console.error(error); return }

  checkins = {}
  ;(data || []).forEach(c => { checkins[c.student_id] = c })
  renderList()
}

function startCheckinPolling() {
  stopCheckinPolling()
  checkinPollTimer = setInterval(refreshCheckins, 6000)
}
function stopCheckinPolling() {
  if (checkinPollTimer) clearInterval(checkinPollTimer)
  checkinPollTimer = null
}

async function startLesson() {
  const subject = document.getElementById('subjectInput').value
  const class_name = document.getElementById('classInput').value
  if (!subject || !class_name) { showToast('נא למלא מקצוע וכיתה', true); return }

  const { data: lesson, error } = await supabaseClient.from('lessons').insert({
    teacher_id: currentUser.id,
    school_id: currentUser.school_id,
    class_name, subject, status: 'active'
  }).select().single()

  if (error) { showToast('שגיאה ביצירת השיעור', true); return }

  currentLesson = lesson

  const { data: classStudents } = await supabaseClient
    .from('users').select('id, name, avatar_color')
    .eq('school_id', currentUser.school_id)
    .eq('class_name', class_name)
    .eq('role', 'student')
    .order('name')

  students = classStudents || []
  students.forEach(s => state[s.id] = null)

  remainingBudget = await getClassBudgetRemaining(class_name)
  await loadPersonalBonusUsage(students.map(s => s.id))
  await computeSurgeMultiplier(class_name, subject, students.length)

  document.getElementById('setupCard').classList.add('hidden')
  document.getElementById('activeLessonSection').classList.remove('hidden')
  document.getElementById('summaryBar').classList.remove('hidden')
  document.getElementById('lessonTitle').textContent = `${subject} – ${class_name}`
  document.getElementById('lessonMeta').textContent = new Date().toLocaleString('he-IL')
  renderSurgeBadge()

  renderList()
  updateSummary()

  await refreshCheckins()
  startCheckinPolling()

  if (remainingBudget <= 0) {
    showToast('⚠️ תקציב הנקודות של הכיתה לחודש זה כבר אזל', true)
  }
  if (students.length === 0) {
    showToast('⚠️ אין תלמידים רשומים בכיתה הזו עדיין', true)
  }
  if (isSurgeActive) {
    showToast(`🔥 שיעור בביקוש נמוך - נקודות מוכפלות פי ${SURGE_MULTIPLIER} היום!`)
  }
}

// Looks at past lessons for the same class+subject+day-of-week, and if historical
// attendance was chronically low, boosts the points for THIS lesson to give extra incentive.
async function computeSurgeMultiplier(class_name, subject, studentCount) {
  currentAttendancePoints = ATTENDANCE_POINTS
  currentBonusPoints = BONUS_POINTS
  isSurgeActive = false
  surgeDemandScore = null

  if (!studentCount) return

  const todayDow = new Date().getDay()
  const lookbackDate = new Date(Date.now() - SURGE_LOOKBACK_DAYS * 24 * 60 * 60 * 1000).toISOString()

  const { data: pastLessons, error } = await supabaseClient
    .from('lessons')
    .select('id, created_at')
    .eq('class_name', class_name)
    .eq('subject', subject)
    .gte('created_at', lookbackDate)

  if (error || !pastLessons || pastLessons.length < 2) return  // not enough history to judge

  const matchingLessons = pastLessons.filter(l => new Date(l.created_at).getDay() === todayDow)
  if (matchingLessons.length < 2) return  // need at least 2 past occurrences of this slot to be confident

  const lessonIds = matchingLessons.map(l => l.id)
  const { data: logs } = await supabaseClient
    .from('point_logs')
    .select('lesson_id, student_id')
    .in('lesson_id', lessonIds)
    .in('reason', ['attendance', 'approved', 'bonus'])

  const attendedPerLesson = {}
  ;(logs || []).forEach(row => {
    if (!attendedPerLesson[row.lesson_id]) attendedPerLesson[row.lesson_id] = new Set()
    attendedPerLesson[row.lesson_id].add(row.student_id)
  })

  const rates = lessonIds.map(id => (attendedPerLesson[id] ? attendedPerLesson[id].size : 0) / studentCount)
  const avgRate = rates.reduce((a, b) => a + b, 0) / rates.length
  surgeDemandScore = avgRate

  if (avgRate < SURGE_LOW_THRESHOLD) {
    isSurgeActive = true
    currentAttendancePoints = Math.round(ATTENDANCE_POINTS * SURGE_MULTIPLIER)
    currentBonusPoints = Math.round(BONUS_POINTS * SURGE_MULTIPLIER)
  }
}

function renderSurgeBadge() {
  const meta = document.getElementById('lessonMeta')
  if (!meta) return
  if (isSurgeActive) {
    meta.innerHTML = meta.textContent + ` <span style="background:rgba(255,61,187,0.18);color:var(--red);padding:2px 10px;border-radius:99px;font-size:0.72rem;font-weight:700;margin-right:8px">🔥 ביקוש נמוך - נקודות פי ${SURGE_MULTIPLIER}</span>`
  }
}

async function loadPersonalBonusUsage(studentIds) {
  if (!studentIds.length) { personalBonusUsed = {}; studentMonthlyTotal = {}; return }

  studentIds.forEach(id => studentMonthlyTotal[id] = 0)

  // כל הנקודות שהתלמידים האלה קיבלו החודש, מכל סיבה - לתקרת ה-300 הכוללת
  const { data: allLogs, error: allErr } = await supabaseClient
    .from('point_logs')
    .select('student_id, points')
    .in('student_id', studentIds)
    .gte('created_at', firstOfMonthISO())

  studentMonthlyTotal = {}
  studentIds.forEach(id => studentMonthlyTotal[id] = 0)
  if (!allErr) {
    ;(allLogs || []).forEach(row => {
      studentMonthlyTotal[row.student_id] = (studentMonthlyTotal[row.student_id] || 0) + row.points
    })
  }

  const { data, error } = await supabaseClient
    .from('point_logs')
    .select('student_id, points')
    .eq('reason', 'personal_bonus')
    .in('student_id', studentIds)
    .gte('created_at', firstOfMonthISO())

  personalBonusUsed = {}
  studentIds.forEach(id => personalBonusUsed[id] = 0)
  if (error) { console.error(error); return }
  ;(data || []).forEach(row => {
    personalBonusUsed[row.student_id] = (personalBonusUsed[row.student_id] || 0) + row.points
  })
}

async function givePersonalBonus(studentId, studentName) {
  if (currentSchoolPlan !== 'premium') {
    showToast('🔒 בונוסים אישיים זמינים רק במנוי הפרימיום (₪699)', true)
    return
  }
  const used = personalBonusUsed[studentId] || 0
  if (used + PERSONAL_BONUS_POINTS > PERSONAL_BONUS_MONTHLY_CAP) {
    showToast(`❌ ${studentName} כבר קיבל/ה ${used} נקודות בונוס אישי החודש (מקסימום ${PERSONAL_BONUS_MONTHLY_CAP})`, true)
    return
  }
  const totalUsed = studentMonthlyTotal[studentId] || 0
  if (totalUsed + PERSONAL_BONUS_POINTS > STUDENT_MONTHLY_CAP) {
    showToast(`❌ ${studentName} כבר קיבל/ה ${totalUsed} נקודות החודש (מקסימום ${STUDENT_MONTHLY_CAP} לתלמיד) - כדי לפנות מקום לשאר הכיתה`, true)
    return
  }
  if (PERSONAL_BONUS_POINTS > remainingBudget) {
    showToast('❌ תקציב הנקודות של הכיתה לחודש זה אזל', true)
    return
  }

  try {
    const { error } = await supabaseClient.from('point_logs').insert({
      lesson_id: currentLesson ? currentLesson.id : null,
      student_id: studentId,
      points: PERSONAL_BONUS_POINTS,
      reason: 'personal_bonus'
    })
    if (error) throw error
    // הערה: לא צריך UPDATE ידני נוסף ל-users.points - טריגר במסד הנתונים מעדכן את זה אוטומטית

    personalBonusUsed[studentId] = used + PERSONAL_BONUS_POINTS
    studentMonthlyTotal[studentId] = totalUsed + PERSONAL_BONUS_POINTS
    remainingBudget -= PERSONAL_BONUS_POINTS
    renderList()
    renderBudgetBar(pointsToAward())
    showToast(`🎁 ${studentName} קיבל/ה ${PERSONAL_BONUS_POINTS} נקודות בונוס אישי!`)
  } catch (err) {
    showToast('שגיאה במתן הבונוס', true)
  }
}

function renderList() {
  document.getElementById('studentList').innerHTML = students.map(s => {
    const st = state[s.id]
    const cardClass = st === 'approved' ? 'approved' : st === 'bonus' ? 'bonus' : st === 'rejected' ? 'rejected' : ''
    const checkin = checkins[s.id]
    const checkinBadge = checkin && checkin.status === 'ממתינה'
      ? '<span style="font-size:0.68rem;background:rgba(61,224,255,0.18);color:var(--accent);padding:2px 8px;border-radius:99px;margin-right:6px">📍 ביקש/ה צ\'ק-אין</span>'
      : checkin && checkin.status === 'אושר'
      ? '<span style="font-size:0.68rem;background:rgba(6,214,160,0.18);color:var(--green);padding:2px 8px;border-radius:99px;margin-right:6px">✓ אושר</span>'
      : ''
    const totalUsed = studentMonthlyTotal[s.id] || 0
    const atCap = totalUsed >= STUDENT_MONTHLY_CAP
    const approveDisabled = st !== 'approved' && (totalUsed + currentAttendancePoints > STUDENT_MONTHLY_CAP)
    const bonusDisabled = st !== 'bonus' && (totalUsed + currentBonusPoints > STUDENT_MONTHLY_CAP)
    const capLabel = `<span class="pb-count" style="${atCap ? 'color:var(--red)' : ''}">${totalUsed}/${STUDENT_MONTHLY_CAP} סה"כ החודש</span>`
    return `
    <div class="student-card ${cardClass}">
      <div class="stu-avatar" style="background:${s.avatar_color || '#3DE0FF'}">${s.name[0]}</div>
      <div class="stu-info">
        <div class="stu-name">${s.name} ${checkinBadge}</div>
        <div class="stu-personal-bonus">
          ${capLabel}
        </div>
      </div>
      <div class="stu-actions">
        <button class="act-btn btn-approve ${st==='approved'?'selected':''}" ${approveDisabled ? 'disabled' : ''} onclick="setState('${s.id}','approved')">✅</button>
        <button class="act-btn btn-reject ${st==='rejected'?'selected':''}" onclick="setState('${s.id}','rejected')">❌</button>
      </div>
    </div>`
  }).join('')
}

function setState(id, newState) {
  if (newState === 'approved' && state[id] !== 'approved' && (studentMonthlyTotal[id]||0) + currentAttendancePoints > STUDENT_MONTHLY_CAP) {
    showToast(`❌ התלמיד/ה כבר קיבל/ה ${studentMonthlyTotal[id]||0} נקודות החודש (מקסימום ${STUDENT_MONTHLY_CAP})`, true)
    return
  }
  if (newState === 'bonus' && state[id] !== 'bonus' && (studentMonthlyTotal[id]||0) + currentBonusPoints > STUDENT_MONTHLY_CAP) {
    showToast(`❌ התלמיד/ה כבר קיבל/ה ${studentMonthlyTotal[id]||0} נקודות החודש (מקסימום ${STUDENT_MONTHLY_CAP})`, true)
    return
  }
  state[id] = state[id] === newState ? null : newState
  updateSummary()
  renderList()
}

function pointsToAward() {
  const approved = students.filter(s => state[s.id] === 'approved').length
  const bonus = students.filter(s => state[s.id] === 'bonus').length
  return approved * currentAttendancePoints + bonus * currentBonusPoints
}

function updateSummary() {
  const approved = students.filter(s => state[s.id] === 'approved').length
  const bonus = students.filter(s => state[s.id] === 'bonus').length
  const rejected = students.filter(s => state[s.id] === 'rejected').length
  const pending = students.filter(s => state[s.id] === null).length
  const pts = pointsToAward()

  document.getElementById('statApproved').textContent = approved
  document.getElementById('statRejected').textContent = rejected
  document.getElementById('statPending').textContent = pending
  document.getElementById('sumApproved').textContent = approved + bonus
  document.getElementById('sumPts').textContent = pts

  renderBudgetBar(pts)
}

function approveAll() {
  students.forEach(s => {
    const totalUsed = studentMonthlyTotal[s.id] || 0
    if (totalUsed + currentAttendancePoints <= STUDENT_MONTHLY_CAP) state[s.id] = 'approved'
  })
  updateSummary(); renderList()
}
function clearAll() {
  students.forEach(s => state[s.id] = null)
  updateSummary(); renderList()
}

async function openSubmit() {
  const hoursSinceLesson = (Date.now() - new Date(currentLesson.created_at).getTime()) / (1000 * 60 * 60)
  if (hoursSinceLesson > 8) {
    const proceed = confirm(`⚠️ עברו מעל 8 שעות מאז שהשיעור נפתח (${Math.floor(hoursSinceLesson)} שעות). התלמידים כבר לא רואים אותו כשיעור פעיל. להמשיך לאשר בכל זאת?`)
    if (!proceed) return
  }

  const approvals = students
    .filter(s => state[s.id] === 'approved' || state[s.id] === 'bonus')
    .map(s => ({
      student_id: s.id,
      points: state[s.id] === 'bonus' ? currentBonusPoints : currentAttendancePoints,
      reason: state[s.id]
    }))

  if (approvals.length === 0) { showToast('לא אישרת אף תלמיד', true); return }

  // Hard block: no single student may exceed the monthly per-student cap
  const overCapStudent = approvals.find(a => (studentMonthlyTotal[a.student_id] || 0) + a.points > STUDENT_MONTHLY_CAP)
  if (overCapStudent) {
    const s = students.find(x => x.id === overCapStudent.student_id)
    showToast(`❌ ${s ? s.name : 'תלמיד/ה'} יחרוג/תחרוג מתקרת ${STUDENT_MONTHLY_CAP} הנקודות לחודש - בטל/י את הסימון עבורו/ה`, true)
    return
  }

  const totalPoints = approvals.reduce((sum, a) => sum + a.points, 0)

  // Hard block: cannot issue more points than the class has left this month
  if (totalPoints > remainingBudget) {
    showToast(`❌ חריגה מהתקציב החודשי של הכיתה! נותרו ${Math.max(0,remainingBudget)} נקודות (₪${Math.max(0,(remainingBudget/POINTS_PER_ILS)).toFixed(0)}), וניסית לחלק ${totalPoints}.`, true)
    return
  }

  // Soft warning when this award will use up most of what's left
  const afterAward = remainingBudget - totalPoints
  if (afterAward < CLASS_MONTHLY_BUDGET_POINTS * 0.2) {
    const proceed = confirm(`⚠️ לאחר החלוקה הזו יישארו לכיתה רק ${afterAward} נקודות (₪${(afterAward/POINTS_PER_ILS).toFixed(0)}) לשארית החודש. להמשיך?`)
    if (!proceed) return
  }

  if (!confirm(`לשלוח נקודות ל-${approvals.length} תלמידים (סה"כ ${totalPoints} נקודות)?`)) return

  try {
    const logs = approvals.map(a => ({
      lesson_id: currentLesson.id, student_id: a.student_id,
      points: a.points, reason: a.reason
    }))
    const { error: logsError } = await supabaseClient.from('point_logs').insert(logs)
    if (logsError) throw logsError
    // הערה: לא צריך לולאת UPDATE ידנית ל-users.points - טריגר במסד הנתונים מעדכן כל תלמיד אוטומטית בעת ה-INSERT למעלה

    // Update checkin rows to reflect the final decision (approved / rejected students)
    const checkinUpdates = students
      .filter(s => state[s.id] === 'approved' || state[s.id] === 'bonus' || state[s.id] === 'rejected')
      .map(s => ({
        lesson_id: currentLesson.id,
        student_id: s.id,
        status: state[s.id] === 'rejected' ? 'נדחה' : 'אושר',
        points: state[s.id] === 'bonus' ? currentBonusPoints : state[s.id] === 'approved' ? currentAttendancePoints : null,
        updated_at: new Date().toISOString()
      }))
    if (checkinUpdates.length > 0) {
      await supabaseClient.from('checkins').upsert(checkinUpdates, { onConflict: 'lesson_id,student_id' })
    }

    await supabaseClient.from('lessons').update({ status: 'completed' }).eq('id', currentLesson.id)

    remainingBudget -= totalPoints
    approvals.forEach(a => {
      studentMonthlyTotal[a.student_id] = (studentMonthlyTotal[a.student_id] || 0) + a.points
    })
    stopCheckinPolling()

    showToast(`🎉 נקודות חולקו ל-${approvals.length} תלמידים!`)
    setTimeout(() => {
      document.getElementById('activeLessonSection').classList.add('hidden')
      document.getElementById('summaryBar').classList.add('hidden')
      document.getElementById('setupCard').classList.remove('hidden')
      document.getElementById('subjectInput').value = ''
      document.getElementById('classInput').value = ''
    }, 1500)
  } catch (err) {
    showToast('שגיאה בשליחת הנקודות', true)
  }
}

async function logout() {
  await supabaseClient.auth.signOut()
  window.location.href = 'index.html'
}

let toastTimer
function showToast(msg, isError) {
  const t = document.getElementById('toast')
  t.textContent = msg
  t.style.background = isError ? 'var(--red)' : 'var(--green)'
  t.style.color = isError ? '#fff' : '#0A0E1A'
  t.classList.add('show')
  clearTimeout(toastTimer)
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800)
}

init()
</script>
